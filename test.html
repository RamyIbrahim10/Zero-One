        @import url('https://fonts.googleapis.com/css?family=Cairo:200,300,400,500,600,700,800,900&display=swap'); 
  body {  
    font-family:var(--bs-body-font-family);
    font-size:var(--bs-body-font-size);
    font-weight:var(--bs-body-font-weight);
    line-height:var(--bs-body-line-height);
    color:var(--bs-body-color);
    text-align:var(--bs-body-text-align);
  }  
* { 
    box-sizing: border-box;
} 

* { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    font-family: Cairo,sans-serif;
} 

body { 
    margin: 0; 
    font-family: var(--bs-body-font-family); 
    font-size: var(--bs-body-font-size); 
    font-weight: var(--bs-body-font-weight); 
    line-height: var(--bs-body-line-height); 
    color: var(--bs-body-color); 
    text-align: var(--bs-body-text-align); 
    background-color: var(--bs-body-bg); 
    -webkit-text-size-adjust: 100%; 
    -webkit-tap-highlight-color: transparent;
} 

body { 
    overflow-x: hidden; 
    font-weight: 400; 
    font-size: 1.6rem; 
    line-height: 1.4;
} 

html { 
    font-size: 62.5%; 
    scroll-behavior: smooth;
} 

:root { 
    --bs-font-sans-serif: system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue","Noto Sans","Liberation Sans",Arial,sans-serif,"Apple Color Emoji","Segoe UI Emoji","Segoe UI Symbol","Noto Color Emoji"; 
    --bs-body-font-family: var(--bs-font-sans-serif); 
    --bs-body-font-size: 1rem; 
    --bs-body-font-weight: 400; 
    --bs-body-line-height: 1.5; 
    --bs-body-color: #212529; 
    --bs-body-bg: #fff; 
    --bs-link-color: #0d6efd; 
    --bs-link-hover-color: #0a58ca; 
} 

:root { 
    --primary-color: #ffc78c; 
    --secondary-color: #fff9f2; 
    --white-color: #fff; 
    --border-radius: 4px;
} 

*,:after,:before { 
    box-sizing: border-box;
} 

.css-zos { 
    margin: 0 auto; 
    padding: 0rem 2rem; 
    max-width: 1170px;
} 

.header-rf1 { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    height: 8rem;
} 

.header-tqk { 
    display: none;
} 

ul { 
    padding-left: 2rem;
} 

ul { 
    margin-top: 0; 
    margin-bottom: 1rem;
} 

button { 
    border-radius: 0;
} 

button { 
    margin: 0; 
    font-family: inherit; 
    font-size: inherit; 
    line-height: inherit;
} 

button { 
    text-transform: none;
} 

button { 
    -webkit-appearance: button;
} 

.header-xhc { 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    align-items: flex-end; 
    cursor: pointer; 
    height: 4.5rem; 
    padding: 0 .6rem!important; 
    background-color: var(--primary-color);
} 

.css-nod { 
    display: -webkit-inline-box; 
    display: -webkit-inline-flex; 
    display: -ms-inline-flexbox; 
    display: inline-flex; 
    -webkit-align-items: center; 
    -webkit-box-align: center; 
    -ms-flex-align: center; 
    align-items: center; 
    -webkit-box-pack: center; 
    -ms-flex-pack: center; 
    -webkit-justify-content: center; 
    justify-content: center; 
    border-radius: var(--border-radius); 
    font-size: 1.65rem; 
    padding: 0rem 1rem; 
    outline: 0; 
    border: 3px solid transparent; 
    background-color: var(--primary-color); 
    color: var(--white-color); 
    -webkit-transition: opacity 0.2s; 
    transition: opacity 0.2s;
} 

button:not(:disabled) { 
    cursor: pointer;
} 

.css-nod:hover { 
    opacity: 0.8;
} 

.css-cec { 
    display: inline-block; 
    font-size: 1.8rem; 
    margin: 1rem; 
    color: inherit; 
    -webkit-transition: color 0.2s; 
    transition: color 0.2s;
} 

.css-cec:hover,.css-cec:active { 
    color: var(--primary-color);
} 

a { 
    color: var(--bs-link-color); 
    text-decoration: underline;
} 

a { 
    color: inherit; 
    text-decoration: none; 
    cursor: pointer;
} 

a:hover { 
    color: var(--bs-link-hover-color);
} 

a:active,a:hover { 
    color: inherit;
} 

.header-j2m { 
    background-color: var(--white-color); 
    width: 3rem; 
    height: .2rem; 
    margin: 0 0 4px;
} 

.header-dl9 { 
    background-color: var(--white-color); 
    width: 2rem; 
    height: .22rem; 
    margin: 0 0 4px;
} 

.header-9so { 
    background-color: var(--white-color); 
    width: 2.5rem; 
    height: .2rem;
} 

.css-lsy { 
    color: var(--primary-color); 
    -webkit-transition: color 0.2s; 
    transition: color 0.2s;
} 

.css-lsy:hover,.css-lsy:active { 
    color: var(--primary-color);
} 

.css-hnr { 
    color: black; 
    -webkit-transition: color 0.2s; 
    transition: color 0.2s;
} 

.css-hnr:hover,.css-hnr:active { 
    color: var(--primary-color);
} 

h1 { 
    margin-top: 0; 
    margin-bottom: .5rem; 
    font-weight: 500; 
    line-height: 1.2;
} 

h1 { 
    font-size: calc(1.375rem + 1.5vw);
} 

@media (min-width: 1200px){ 
  h1 { 
    font-size: 2.5rem;
  } 
}     

h1 { 
    margin-top: 0; 
    margin-bottom: 0;

.css-b12 { 
    font-size: 2.5rem; 
    font-weight: 600; 
    margin-left: 0.5rem;
} 

img { 
    vertical-align: middle;
}
